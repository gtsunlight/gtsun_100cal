<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 차트 계산기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:30px}
.wrap{display:flex;gap:24px;background:#fff;padding:20px;border-radius:14px;box-shadow:0 2px 14px rgba(0,0,0,.15);align-items:stretch}
.chart-area{display:flex;flex-direction:column;gap:10px}
table{border-collapse:collapse}
td{width:38px;height:38px;text-align:center;vertical-align:middle;font-size:13px;border:1px solid #bbb;cursor:pointer;transition:background .15s}
td.highlighted{background:#1a5fc8;color:#fff;font-weight:bold}
td:hover:not(.highlighted){background:#e8e8e8}
.clear-btn{width:100%;padding:9px;border:1px solid #aaa;border-radius:20px;background:#f0f0f0;font-size:14px;cursor:pointer}
.clear-btn:hover{background:#ddd}

/* 계산기: 차트 높이에 맞게 stretch */
.calc{background:#1a1f2e;border-radius:20px;padding:16px 14px;width:214px;display:flex;flex-direction:column;gap:10px}
.calc-title{display:flex;align-items:center;gap:8px;color:#a0aec0;font-size:13px;font-weight:500;flex-shrink:0}
.display{background:#141824;border-radius:12px;padding:12px 14px 8px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;gap:4px;flex-shrink:0;min-height:64px}
.display-expr{font-size:12px;color:#5a6a8a;min-height:14px}
.display-val{font-size:26px;font-weight:400;color:#e8edf5;word-break:break-all}

/* 버튼 영역: 남은 공간 모두 차지 */
.btn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1}
.btn{border:none;border-radius:12px;width:100%;height:100%;font-size:17px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#e8edf5;background:#252b3b;transition:filter .15s,transform .1s}
.btn:hover{filter:brightness(1.2)}
.btn:active{filter:brightness(.8);transform:scale(.95)}
.btn.op{background:#2e3550;color:#7b9fd4}
.btn.eq{background:#3d7aed;color:#fff}
.btn.clear{background:#2e3550;color:#a0aec0}
</style>
</head>
<body>
<div class="wrap">
  <div class="chart-area">
    <table id="chart"></table>
    <button class="clear-btn" onclick="clearAll()">초기화</button>
  </div>
  <div class="calc">
    <div class="calc-title"><span>🖩</span> 사칙연산 계산기</div>
    <div class="display">
      <span class="display-expr" id="expr-hint"></span>
      <span class="display-val" id="display">0</span>
    </div>
    <div class="btn-grid">
      <!-- 행1: 7 8 9 + -->
      <button class="btn" onclick="pressNum('7')">7</button>
      <button class="btn" onclick="pressNum('8')">8</button>
      <button class="btn" onclick="pressNum('9')">9</button>
      <button class="btn op" onclick="pressOp('+')">+</button>
      <!-- 행2: 4 5 6 - -->
      <button class="btn" onclick="pressNum('4')">4</button>
      <button class="btn" onclick="pressNum('5')">5</button>
      <button class="btn" onclick="pressNum('6')">6</button>
      <button class="btn op" onclick="pressOp('-')">−</button>
      <!-- 행3: 1 2 3 × -->
      <button class="btn" onclick="pressNum('1')">1</button>
      <button class="btn" onclick="pressNum('2')">2</button>
      <button class="btn" onclick="pressNum('3')">3</button>
      <button class="btn op" onclick="pressOp('×')">×</button>
      <!-- 행4: C 0 = ÷ -->
      <button class="btn clear" onclick="clearAll()">C</button>
      <button class="btn" onclick="pressNum('0')">0</button>
      <button class="btn eq" onclick="pressEq()">=</button>
      <button class="btn op" onclick="pressOp('÷')">÷</button>
    </div>
  </div>
</div>
<script>
const chartEl = document.getElementById('chart');
for (let r = 0; r < 10; r++) {
  const tr = document.createElement('tr');
  for (let c = 0; c < 10; c++) {
    const n = r * 10 + c + 1;
    const td = document.createElement('td');
    td.textContent = n; td.id = 'n' + n;
    tr.appendChild(td);
  }
  chartEl.appendChild(tr);
}
const disp = document.getElementById('display');
const hint = document.getElementById('expr-hint');
let accumulator = 0, pendingOp = null, repeatOp = null, repeatVal = null;
let inputting = false, current = '';
function fmt(n) { return Number.isFinite(n) ? parseFloat(n.toFixed(10)) : '오류'; }
function showVal(n) { disp.textContent = fmt(n); }
function highlight(val) {
  const n = Math.round(val);
  if (Number.isFinite(n) && n >= 1 && n <= 100) {
    const el = document.getElementById('n' + n);
    if (el) el.classList.add('highlighted');
  }
}
function clearAll() {
  document.querySelectorAll('td.highlighted').forEach(t => t.classList.remove('highlighted'));
  accumulator = 0; pendingOp = null; repeatOp = null; repeatVal = null;
  inputting = false; current = '';
  disp.textContent = '0'; hint.textContent = '';
}
function applyOp(a, op, b) {
  switch (op) {
    case '+': return a + b;
    case '-': return a - b;
    case '×': return a * b;
    case '÷': return b === 0 ? Infinity : a / b;
  }
}
function pressNum(k) {
  if (!inputting) { current = k; inputting = true; }
  else { current = current === '0' ? k : current + k; }
  disp.textContent = current;
  hint.textContent = pendingOp ? fmt(accumulator) + ' ' + pendingOp : '';
}
function pressOp(op) {
  const num = inputting ? parseFloat(current) : accumulator;
  if (pendingOp && inputting) {
    accumulator = applyOp(accumulator, pendingOp, num);
    showVal(accumulator); highlight(accumulator);
  } else { accumulator = num; }
  pendingOp = op; repeatOp = null; repeatVal = null;
  inputting = false; current = '';
  hint.textContent = fmt(accumulator) + ' ' + op;
}
function pressEq() {
  let result;
  if (repeatOp !== null && !inputting) {
    result = applyOp(accumulator, repeatOp, repeatVal);
  } else {
    const lhs = accumulator;
    const rhs = inputting ? parseFloat(current) : accumulator;
    const op = pendingOp !== null ? pendingOp : repeatOp;
    if (op === null) return;
    result = applyOp(lhs, op, rhs);
    if (op === '×') { repeatOp = '+'; repeatVal = lhs; }
    else { repeatOp = op; repeatVal = rhs; }
    pendingOp = null;
  }
  accumulator = result; inputting = false; current = ''; hint.textContent = '';
  showVal(result); highlight(result);
}
</script>
</body>
</html>
